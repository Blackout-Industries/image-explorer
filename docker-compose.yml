services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  # Production build — usage: docker compose --profile prod up prod
  prod:
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
    profiles:
      - prod

  # Local-only registry proxy. Lets the SPA fetch images by ref
  # (e.g. nginx:1.27) without hitting registry CORS limits.
  # Usage: docker compose up image-pull-proxy
  image-pull-proxy:
    build:
      context: ./image-pull-proxy
    image: image-pull-proxy:local
    ports:
      - "5099:5099"
    restart: unless-stopped
